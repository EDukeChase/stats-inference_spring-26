name: Force Render All

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find all .qmd files
        id: changed
        run: |
          mapfile -t QMD_FILES < <(git ls-files '*.qmd')
          if [ "${#QMD_FILES[@]}" -eq 0 ]; then
            echo "No .qmd files found."
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${QMD_FILES[@]}"
            echo "any=true" >> "$GITHUB_OUTPUT"
            jq -nR '[inputs]' <<< "$(printf '%s\n' "${QMD_FILES[@]}")" > /tmp/changed_qmds.json
          fi

      - name: Set up R
        if: steps.changed.outputs.any == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install and cache R packages
        if: steps.changed.outputs.any == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::ggplot2
            any::dplyr
            any::tidyr
            any::readr
            any::tibble
            any::stringr
            any::kableExtra

      - name: Set up Quarto
        if: steps.changed.outputs.any == 'true'
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render all .qmd files
        if: steps.changed.outputs.any == 'true'
        run: |
          set -e
          rm -rf out && mkdir -p out
          mapfile -t QMD_FILES < <(jq -r '.[]' /tmp/changed_qmds.json)
          for f in "${QMD_FILES[@]}"; do
            echo "Rendering $f"
            quarto render "$f" --output-dir out
          done

      - name: Set up Node.js for Decktape
        if: steps.changed.outputs.any == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install headless Chromium dependencies
        if: steps.changed.outputs.any == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpangocairo-1.0-0 libpango-1.0-0 \
            libcairo2 libx11-6 libx11-xcb1 libxcb1 libxext6 libxshmfence1 \
            fonts-liberation

      - name: Convert Reveal.js HTML to PDF via Decktape
        if: steps.changed.outputs.any == 'true'
        run: |
          shopt -s nullglob
          for html in out/*.html; do
            base="${html%.html}"
            npx -y decktape reveal \
              --size "1200x1116" \
              --chrome-arg=--no-sandbox \
              --chrome-arg=--disable-setuid-sandbox \
              --chrome-arg=--disable-dev-shm-usage \
              "$html" "${base}.pdf"
          done

      - name: Rename outputs with date and hash
        if: steps.changed.outputs.any == 'true'
        run: |
          shopt -s nullglob
          for f in out/*.html out/*.pdf; do
            base="$(basename "$f")"
            stem="${base%.*}"
            ext="${base##*.}"
            mv -v "$f" "out/${stem}_$(git log -1 --format=%cd --date=format:'%Y-%m-%dT%H-%M' HEAD)_$(git rev-parse --short HEAD).${ext}"
          done

      - name: Commit PDFs to repo
        if: steps.changed.outputs.any == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p pdfs
          cp out/*.pdf pdfs/
          git add pdfs/
          git commit -m "force-render: $(git log -1 --format=%cd --date=format:'%Y-%m-%dT%H-%M' HEAD) $(git rev-parse --short HEAD)"
          git push

      - name: Upload PDFs to Dropbox
        if: steps.changed.outputs.any == 'true'
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
        run: |
          for pdf in out/*.pdf; do
            filename="$(basename "$pdf")"
            curl -X POST https://content.dropboxapi.com/2/files/upload \
              --header "Authorization: Bearer $DROPBOX_TOKEN" \
              --header "Dropbox-API-Arg: {\"path\": \"/mathstats-slides/${filename}\", \"mode\": \"overwrite\"}" \
              --header "Content-Type: application/octet-stream" \
              --data-binary "@$pdf"
          done

      - name: Upload PDFs as artifact
        if: steps.changed.outputs.any == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: force-rendered_$(git log -1 --format=%cd --date=format:'%Y-%m-%dT%H-%M' HEAD)_$(git rev-parse --short HEAD)
          path: out/*.pdf